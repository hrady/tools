<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zahid Group — Email Generator</title>
<style>
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; margin: 0;
  background: #f5f5f5; color: #1a1a1a;
}
.card {
  background: #fff; border-radius: 12px;
  padding: 40px; max-width: 500px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.logo { font-size: 18px; font-weight: 600; color: #15262E; margin-bottom: 8px; }
.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
.status { font-size: 15px; margin: 16px 0; }
.success { color: #27ae60; }
.error { color: #c0392b; }
.spinner {
  width: 40px; height: 40px; margin: 20px auto;
  border: 3px solid #eee; border-top: 3px solid #15262E;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Zahid Group</div>
  <div class="sub">Dunning Letter Generator</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Generating your email...</div>
</div>

<script>
(function() {
  try {
    // Read from URL fragment (#) — not query params (?)
    // This avoids server-side URI length limits
    // Format: #subject=...&lang=...&body=...
    var hash = window.location.hash.substring(1);
    if (!hash) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '<span class="error">No letter content provided.</span>';
      return;
    }

    var params = new URLSearchParams(hash);
    var subject = params.get('subject') || 'Outstanding Balance Review';
    var body = params.get('body') || '';
    var lang = params.get('lang') || 'en';

    if (!body) {
      document.getElementById('spinner').style.display = 'none';
      document.getElementById('status').innerHTML = '<span class="error">No letter body provided.</span>';
      return;
    }

    var decodedBody = decodeURIComponent(body);

    // Wrap in RTL div if Arabic
    var htmlBody = lang === 'ar'
      ? '<div dir="rtl" style="font-family:Segoe UI,Arial,sans-serif;font-size:14px;">' + decodedBody + '</div>'
      : '<div style="font-family:Segoe UI,Arial,sans-serif;font-size:14px;">' + decodedBody + '</div>';

    // Build .eml content with HTML body
    var eml = [
      'From: ',
      'To: ',
      'Subject: ' + subject,
      'MIME-Version: 1.0',
      'X-Unsent: 1',
      'Content-Type: text/html; charset=UTF-8',
      '',
      '<!DOCTYPE html>',
      '<html><head><meta charset="utf-8"></head>',
      '<body>',
      htmlBody,
      '</body></html>'
    ].join('\r\n');

    // Create blob and trigger download
    var blob = new Blob([eml], { type: 'message/rfc822' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');

    var safeSubject = subject.replace(/[^a-zA-Z0-9]/g, '_').substring(0, 40);
    var date = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'Dunning_' + safeSubject + '_' + date + '.eml';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML =
      '<span class="success">\u2713 Email downloaded</span><br><br>' +
      '<span style="font-size:13px;color:#666;">Double-click the .eml file to open in Outlook.<br>' +
      'Add the recipient and click Send.</span>';

  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
  }
})();
</script>
</body>
</html>
