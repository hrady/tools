<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zahid Group — Email Generator</title>
<style>
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; margin: 0;
  background: #f5f5f5; color: #1a1a1a;
}
.card {
  background: #fff; border-radius: 12px;
  padding: 40px; max-width: 500px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.logo { font-size: 18px; font-weight: 600; color: #15262E; margin-bottom: 8px; }
.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
.status { font-size: 15px; margin: 16px 0; }
.success { color: #27ae60; }
.error { color: #c0392b; }
.spinner {
  width: 40px; height: 40px; margin: 20px auto;
  border: 3px solid #eee; border-top: 3px solid #15262E;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Zahid Group</div>
  <div class="sub">Dunning Letter Generator</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Generating your email...</div>
</div>

<script>
/*
  URL FORMAT (agent sends only data — page builds the letter):
  
  #customer=HITACHI%20ENERGY%20LTD
  &cuno=Z038603
  &pyno=ZIZ038603
  &total=12229925.50
  &count=9
  &div=ZIN
  &date=03-Apr-2026
  &lang=en
  &invoices=181241100431,30-Jul-2024,13-Sep-2024,202,60375.00
            |181241100430,30-Jul-2024,13-Sep-2024,202,44850.00

  Each invoice: number,invoiceDate,dueDate,daysOverdue,amount
  Invoices separated by |
*/

(function() {
  try {
    var hash = window.location.hash.substring(1);
    if (!hash) { showError('No data provided.'); return; }

    var p = {};
    hash.split('&').forEach(function(pair) {
      var i = pair.indexOf('=');
      if (i > -1) {
        var k = decodeURIComponent(pair.substring(0, i));
        var v = decodeURIComponent(pair.substring(i + 1));
        p[k] = v;
      }
    });

    var customer = p.customer || 'Valued Customer';
    var cuno = p.cuno || '';
    var pyno = p.pyno || '';
    var total = p.total || '0';
    var count = p.count || '0';
    var div = p.div || '';
    var date = p.date || new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    var lang = p.lang || 'en';
    var invoicesRaw = p.invoices || '';

    // Parse invoices
    var invoices = [];
    if (invoicesRaw) {
      invoicesRaw.split('|').forEach(function(row) {
        var cols = row.split(',');
        if (cols.length >= 5) {
          invoices.push({
            number: cols[0].trim(),
            invoiceDate: cols[1].trim(),
            dueDate: cols[2].trim(),
            days: parseInt(cols[3].trim()),
            amount: cols[4].trim()
          });
        }
      });
    }

    // Format amount with commas
    function fmt(n) {
      var num = parseFloat(n.replace(/,/g, ''));
      if (isNaN(num)) return n;
      return num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    // Color for overdue days
    function daysColor(d) {
      if (d > 180) return '#c0392b';
      if (d > 90) return '#e67e22';
      return '#2c3e50';
    }

    // Build invoice table
    var invoiceHtml = '';
    if (invoices.length > 0) {
      invoiceHtml = '<table style="width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;">';
      invoiceHtml += '<tr style="background:#15262E;color:#fff;">';
      invoiceHtml += '<th style="padding:10px;text-align:left;border:1px solid #ddd;">Invoice</th>';
      invoiceHtml += '<th style="padding:10px;text-align:left;border:1px solid #ddd;">Invoice Date</th>';
      invoiceHtml += '<th style="padding:10px;text-align:left;border:1px solid #ddd;">Due Date</th>';
      invoiceHtml += '<th style="padding:10px;text-align:right;border:1px solid #ddd;">Days Overdue</th>';
      invoiceHtml += '<th style="padding:10px;text-align:right;border:1px solid #ddd;">Amount (SAR)</th>';
      invoiceHtml += '</tr>';
      for (var i = 0; i < invoices.length; i++) {
        var inv = invoices[i];
        var bg = i % 2 === 0 ? '#ffffff' : '#f9f9f9';
        invoiceHtml += '<tr style="background:' + bg + ';">';
        invoiceHtml += '<td style="padding:8px;border:1px solid #ddd;">' + inv.number + '</td>';
        invoiceHtml += '<td style="padding:8px;border:1px solid #ddd;">' + inv.invoiceDate + '</td>';
        invoiceHtml += '<td style="padding:8px;border:1px solid #ddd;">' + inv.dueDate + '</td>';
        invoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:right;color:' + daysColor(inv.days) + ';font-weight:bold;">' + inv.days + '</td>';
        invoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:right;">' + fmt(inv.amount) + '</td>';
        invoiceHtml += '</tr>';
      }
      invoiceHtml += '<tr style="background:#e8f4f8;font-weight:bold;">';
      invoiceHtml += '<td colspan="4" style="padding:10px;border:1px solid #ddd;text-align:right;">Total Outstanding:</td>';
      invoiceHtml += '<td style="padding:10px;border:1px solid #ddd;text-align:right;color:#15262E;">SAR ' + fmt(total) + '</td>';
      invoiceHtml += '</tr></table>';
    }

    // Build English letter
    var enHtml = [
      '<div style="font-family:Segoe UI,Arial,sans-serif;font-size:14px;color:#333;line-height:1.7;max-width:700px;">',
      '<p style="color:#888;">Date: ' + date + '</p>',
      '<p>Dear Valued Customer,</p>',
      '<p>We truly appreciate the business relationship we have built with <strong>' + customer + '</strong>. Your partnership means a great deal to us.</p>',
      '<p>As part of our regular account review, we noticed that your account currently has <strong>' + count + ' outstanding invoice' + (parseInt(count) !== 1 ? 's' : '') + '</strong> totaling <strong>SAR ' + fmt(total) + '</strong> that require your attention.</p>',
      invoices.length > 0 ? '<h3 style="color:#15262E;border-bottom:2px solid #ED0C0C;padding-bottom:6px;margin-top:24px;">Top Outstanding Invoices</h3>' : '',
      invoiceHtml,
      '<p>We understand that managing payments across multiple invoices can be complex. Could we ask you to look into this within the next <strong>7 business days</strong>? A quick confirmation of payment timing or a note about any issues would be very helpful.</p>',
      '<p>If there is anything on our end that may be causing a delay \u2014 a missing document, a disputed charge, or a processing issue \u2014 please let us know and we will address it right away.</p>',
      '<p>We value our partnership and look forward to resolving this matter together.</p>',
      '<p>Warm regards,</p>',
      '<p><strong>Accounts Receivable</strong><br><strong>Zahid Group \u2014 Division ' + div + '</strong></p>',
      '</div>'
    ].join('\n');

    // Build Arabic letter
    var arInvoiceHtml = '';
    if (invoices.length > 0) {
      arInvoiceHtml = '<table style="width:100%;border-collapse:collapse;margin:16px 0;font-size:13px;direction:rtl;">';
      arInvoiceHtml += '<tr style="background:#15262E;color:#fff;">';
      arInvoiceHtml += '<th style="padding:10px;text-align:right;border:1px solid #ddd;">\u0631\u0642\u0645 \u0627\u0644\u0641\u0627\u062a\u0648\u0631\u0629</th>';
      arInvoiceHtml += '<th style="padding:10px;text-align:right;border:1px solid #ddd;">\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0641\u0627\u062a\u0648\u0631\u0629</th>';
      arInvoiceHtml += '<th style="padding:10px;text-align:right;border:1px solid #ddd;">\u062a\u0627\u0631\u064a\u062e \u0627\u0644\u0627\u0633\u062a\u062d\u0642\u0627\u0642</th>';
      arInvoiceHtml += '<th style="padding:10px;text-align:left;border:1px solid #ddd;">\u0623\u064a\u0627\u0645 \u0627\u0644\u062a\u0623\u062e\u064a\u0631</th>';
      arInvoiceHtml += '<th style="padding:10px;text-align:left;border:1px solid #ddd;">\u0627\u0644\u0645\u0628\u0644\u063a (\u0631.\u0633)</th>';
      arInvoiceHtml += '</tr>';
      for (var j = 0; j < invoices.length; j++) {
        var ainv = invoices[j];
        var abg = j % 2 === 0 ? '#ffffff' : '#f9f9f9';
        arInvoiceHtml += '<tr style="background:' + abg + ';">';
        arInvoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:right;">' + ainv.number + '</td>';
        arInvoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:right;">' + ainv.invoiceDate + '</td>';
        arInvoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:right;">' + ainv.dueDate + '</td>';
        arInvoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:left;color:' + daysColor(ainv.days) + ';font-weight:bold;">' + ainv.days + '</td>';
        arInvoiceHtml += '<td style="padding:8px;border:1px solid #ddd;text-align:left;">' + fmt(ainv.amount) + '</td>';
        arInvoiceHtml += '</tr>';
      }
      arInvoiceHtml += '<tr style="background:#e8f4f8;font-weight:bold;">';
      arInvoiceHtml += '<td colspan="4" style="padding:10px;border:1px solid #ddd;text-align:left;">\u0625\u062c\u0645\u0627\u0644\u064a \u0627\u0644\u0645\u0633\u062a\u062d\u0642:</td>';
      arInvoiceHtml += '<td style="padding:10px;border:1px solid #ddd;text-align:left;color:#15262E;">' + fmt(total) + ' \u0631.\u0633</td>';
      arInvoiceHtml += '</tr></table>';
    }

    var arHtml = [
      '<div dir="rtl" style="font-family:Segoe UI,Arial,sans-serif;font-size:14px;color:#333;line-height:1.7;max-width:700px;">',
      '<p style="color:#888;">\u0627\u0644\u062a\u0627\u0631\u064a\u062e: ' + date + '</p>',
      '<p>\u0639\u0645\u064a\u0644\u0646\u0627 \u0627\u0644\u0643\u0631\u064a\u0645\u060c</p>',
      '<p>\u0646\u0642\u062f\u0651\u0631 \u062d\u0642\u0627\u064b \u0639\u0644\u0627\u0642\u0629 \u0627\u0644\u0639\u0645\u0644 \u0627\u0644\u062a\u064a \u0628\u0646\u064a\u0646\u0627\u0647\u0627 \u0645\u0639 <strong>' + customer + '</strong>. \u0634\u0631\u0627\u0643\u062a\u0643\u0645 \u062a\u0639\u0646\u064a \u0644\u0646\u0627 \u0627\u0644\u0643\u062b\u064a\u0631.</p>',
      '<p>\u0636\u0645\u0646 \u0645\u0631\u0627\u062c\u0639\u062a\u0646\u0627 \u0627\u0644\u062f\u0648\u0631\u064a\u0629 \u0644\u0644\u062d\u0633\u0627\u0628\u0627\u062a\u060c \u0644\u0627\u062d\u0638\u0646\u0627 \u0623\u0646 \u062d\u0633\u0627\u0628\u0643\u0645 \u064a\u062d\u062a\u0648\u064a \u062d\u0627\u0644\u064a\u0627\u064b \u0639\u0644\u0649 <strong>' + count + ' \u0641\u0627\u062a\u0648\u0631\u0629 \u0645\u0633\u062a\u062d\u0642\u0629</strong> \u0628\u0625\u062c\u0645\u0627\u0644\u064a <strong>' + fmt(total) + ' \u0631.\u0633</strong> \u062a\u062a\u0637\u0644\u0628 \u0627\u0647\u062a\u0645\u0627\u0645\u0643\u0645.</p>',
      invoices.length > 0 ? '<h3 style="color:#15262E;border-bottom:2px solid #ED0C0C;padding-bottom:6px;margin-top:24px;">\u0623\u0639\u0644\u0649 \u0627\u0644\u0641\u0648\u0627\u062a\u064a\u0631 \u0627\u0644\u0645\u0633\u062a\u062d\u0642\u0629</h3>' : '',
      arInvoiceHtml,
      '<p>\u0646\u062a\u0641\u0647\u0651\u0645 \u0623\u0646 \u0625\u062f\u0627\u0631\u0629 \u0627\u0644\u0645\u062f\u0641\u0648\u0639\u0627\u062a \u0639\u0628\u0631 \u0641\u0648\u0627\u062a\u064a\u0631 \u0645\u062a\u0639\u062f\u062f\u0629 \u0642\u062f \u064a\u0643\u0648\u0646 \u0645\u0639\u0642\u062f\u0627\u064b. \u0647\u0644 \u064a\u0645\u0643\u0646\u0643\u0645 \u0627\u0644\u062a\u0643\u0631\u0651\u0645 \u0628\u0645\u0631\u0627\u062c\u0639\u0629 \u0647\u0630\u0627 \u0627\u0644\u0623\u0645\u0631 \u062e\u0644\u0627\u0644 <strong>7 \u0623\u064a\u0627\u0645 \u0639\u0645\u0644</strong>\u061f</p>',
      '<p>\u0625\u0630\u0627 \u0643\u0627\u0646 \u0647\u0646\u0627\u0643 \u0623\u064a \u0634\u064a\u0621 \u0645\u0646 \u0637\u0631\u0641\u0646\u0627 \u0642\u062f \u064a\u064f\u0633\u0628\u0651\u0628 \u062a\u0623\u062e\u064a\u0631\u0627\u064b \u2014 \u0645\u0633\u062a\u0646\u062f \u0645\u0641\u0642\u0648\u062f\u060c \u0623\u0648 \u0645\u0628\u0644\u063a \u0645\u062a\u0646\u0627\u0632\u0639 \u0639\u0644\u064a\u0647\u060c \u0623\u0648 \u0645\u0634\u0643\u0644\u0629 \u0641\u064a \u0627\u0644\u0645\u0639\u0627\u0644\u062c\u0629 \u2014 \u064a\u064f\u0631\u062c\u0649 \u0625\u0639\u0644\u0627\u0645\u0646\u0627 \u0648\u0633\u0646\u062a\u0639\u0627\u0645\u0644 \u0645\u0639\u0647 \u0641\u0648\u0631\u0627\u064b.</p>',
      '<p>\u0646\u064f\u0642\u062f\u0651\u0631 \u0634\u0631\u0627\u0643\u062a\u0643\u0645 \u0648\u0646\u062a\u0637\u0644\u0639 \u0644\u062d\u0644 \u0647\u0630\u0627 \u0627\u0644\u0623\u0645\u0631 \u0645\u0639\u0627\u064b.</p>',
      '<p>\u0645\u0639 \u0623\u0637\u064a\u0628 \u0627\u0644\u062a\u062d\u064a\u0627\u062a\u060c</p>',
      '<p><strong>\u0627\u0644\u0630\u0645\u0645 \u0627\u0644\u0645\u062f\u064a\u0646\u0629</strong><br><strong>\u0645\u062c\u0645\u0648\u0639\u0629 \u0632\u0627\u0647\u062f \u2014 \u0642\u0633\u0645 ' + div + '</strong></p>',
      '</div>'
    ].join('\n');

    // Pick language
    var letterHtml = lang === 'ar' ? arHtml : enHtml;
    var subjectText = lang === 'ar'
      ? '\u062a\u0630\u0643\u064a\u0631 \u0648\u062f\u0651\u064a \u2014 \u0641\u0648\u0627\u062a\u064a\u0631 \u0645\u0633\u062a\u062d\u0642\u0629 | ' + customer
      : 'Friendly Reminder \u2014 Outstanding Invoices | ' + customer;

    // Build .eml
    var eml = [
      'From: ',
      'To: ',
      'Subject: ' + subjectText,
      'MIME-Version: 1.0',
      'X-Unsent: 1',
      'Content-Type: text/html; charset=UTF-8',
      '',
      '<!DOCTYPE html>',
      '<html><head><meta charset="utf-8"></head>',
      '<body style="margin:0;padding:20px;">',
      letterHtml,
      '</body></html>'
    ].join('\r\n');

    // Download
    var blob = new Blob([eml], { type: 'message/rfc822' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var safeName = customer.replace(/[^a-zA-Z0-9 ]/g, '').substring(0, 30).trim().replace(/\s+/g, '_');
    var today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'Dunning_' + safeName + '_' + today + '.eml';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML =
      '<span class="success">\u2713 Email downloaded</span><br><br>' +
      '<span style="font-size:13px;color:#666;">Double-click the <strong>.eml</strong> file to open in Outlook.<br>' +
      'Add the recipient and click Send.</span>';

  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
  }
})();
</script>
</body>
</html>
