<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Zahid Group — Email Generator</title>
<style>
body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; margin: 0;
  background: #f5f5f5; color: #1a1a1a;
}
.card {
  background: #fff; border-radius: 12px;
  padding: 40px; max-width: 500px; text-align: center;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}
.logo { font-size: 18px; font-weight: 600; color: #15262E; margin-bottom: 8px; }
.sub { color: #666; font-size: 14px; margin-bottom: 24px; }
.status { font-size: 15px; margin: 16px 0; }
.success { color: #27ae60; }
.error { color: #c0392b; }
.spinner {
  width: 40px; height: 40px; margin: 20px auto;
  border: 3px solid #eee; border-top: 3px solid #15262E;
  border-radius: 50%; animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Zahid Group</div>
  <div class="sub">Dunning Letter Generator</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">Generating your email...</div>
</div>

<script>
(function() {
  try {
    var hash = window.location.hash.substring(1);
    if (!hash) { showErr('No data provided.'); return; }

    var p = {};
    hash.split('&').forEach(function(pair) {
      var i = pair.indexOf('=');
      if (i > -1) {
        p[decodeURIComponent(pair.substring(0, i))] = decodeURIComponent(pair.substring(i + 1));
      }
    });

    var customer = p.customer || 'Valued Customer';
    var cuno = p.cuno || '';
    var total = p.total || '0';
    var count = p.count || '0';
    var div = p.div || '';
    var date = p.date || new Date().toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'});
    var lang = p.lang || 'en';
    var invoicesRaw = p.invoices || '';

    // Parse invoices — ONLY include overdue (days > 0)
    var invoices = [];
    if (invoicesRaw) {
      invoicesRaw.split('|').forEach(function(row) {
        var cols = row.split(',');
        if (cols.length >= 5) {
          var days = parseInt(cols[3].trim());
          if (days > 0) {
            invoices.push({
              number: cols[0].trim(),
              invoiceDate: cols[1].trim(),
              dueDate: cols[2].trim(),
              days: days,
              amount: cols[4].trim()
            });
          }
        }
      });
    }

    // Sort by amount descending
    invoices.sort(function(a, b) {
      return parseFloat(b.amount.replace(/,/g,'')) - parseFloat(a.amount.replace(/,/g,''));
    });

    function fmt(n) {
      var num = parseFloat(String(n).replace(/,/g, ''));
      if (isNaN(num)) return n;
      return num.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function daysColor(d) {
      if (d > 180) return '#c0392b';
      if (d > 90) return '#e67e22';
      return '#2c3e50';
    }

    // Arabic date formatting
    var arMonths = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    var enMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function toArDate(dateStr) {
      // Handle DD-Mon-YYYY format
      var parts = dateStr.match(/(\d+)-([A-Za-z]+)-(\d+)/);
      if (parts) {
        var idx = enMonths.indexOf(parts[2]);
        if (idx > -1) return parts[1] + '-' + arMonths[idx] + '-' + parts[3];
      }
      // Handle YYYY-MM-DD format
      parts = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (parts) {
        var m = parseInt(parts[2]) - 1;
        return parts[3] + '-' + arMonths[m] + '-' + parts[1];
      }
      return dateStr;
    }

    function toArLetterDate(dateStr) {
      var parts = dateStr.match(/(\d{4})-(\d{2})-(\d{2})/);
      if (parts) {
        var m = parseInt(parts[2]) - 1;
        return parseInt(parts[3]) + ' ' + arMonths[m] + ' ' + parts[1];
      }
      return dateStr;
    }

    // Recalculate actual overdue total from filtered invoices
    var overdueTotal = 0;
    invoices.forEach(function(inv) {
      overdueTotal += parseFloat(inv.amount.replace(/,/g,''));
    });

    var ps = 'margin:6px 0;font-size:14px;';
    var ws = 'font-family:Segoe UI,Arial,sans-serif;font-size:14px;color:#333;line-height:1.5;max-width:700px;';

    // English table
    function buildEnTable() {
      if (!invoices.length) return '';
      var t = '<table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;">';
      t += '<tr style="background:#15262E;color:#fff;">';
      t += '<th style="padding:8px;text-align:left;border:1px solid #ddd;">Invoice</th>';
      t += '<th style="padding:8px;text-align:left;border:1px solid #ddd;">Invoice Date</th>';
      t += '<th style="padding:8px;text-align:left;border:1px solid #ddd;">Due Date</th>';
      t += '<th style="padding:8px;text-align:right;border:1px solid #ddd;">Days Overdue</th>';
      t += '<th style="padding:8px;text-align:right;border:1px solid #ddd;">Amount (SAR)</th></tr>';
      for (var i = 0; i < invoices.length; i++) {
        var inv = invoices[i], bg = i % 2 === 0 ? '#fff' : '#f9f9f9';
        t += '<tr style="background:' + bg + ';">';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;">' + inv.number + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;">' + inv.invoiceDate + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;">' + inv.dueDate + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:right;color:' + daysColor(inv.days) + ';font-weight:bold;">' + inv.days + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:right;">' + fmt(inv.amount) + '</td></tr>';
      }
      t += '<tr style="background:#e8f4f8;font-weight:bold;">';
      t += '<td colspan="4" style="padding:8px;border:1px solid #ddd;text-align:right;">Total Overdue:</td>';
      t += '<td style="padding:8px;border:1px solid #ddd;text-align:right;color:#15262E;">SAR ' + fmt(overdueTotal) + '</td></tr></table>';
      return t;
    }

    // Arabic table
    function buildArTable() {
      if (!invoices.length) return '';
      var t = '<table style="width:100%;border-collapse:collapse;margin:12px 0;font-size:13px;direction:rtl;">';
      t += '<tr style="background:#15262E;color:#fff;">';
      t += '<th style="padding:8px;text-align:right;border:1px solid #ddd;">رقم الفاتورة</th>';
      t += '<th style="padding:8px;text-align:right;border:1px solid #ddd;">تاريخ الفاتورة</th>';
      t += '<th style="padding:8px;text-align:right;border:1px solid #ddd;">تاريخ الاستحقاق</th>';
      t += '<th style="padding:8px;text-align:left;border:1px solid #ddd;">أيام التأخير</th>';
      t += '<th style="padding:8px;text-align:left;border:1px solid #ddd;">المبلغ (ر.س)</th></tr>';
      for (var j = 0; j < invoices.length; j++) {
        var inv = invoices[j], bg = j % 2 === 0 ? '#fff' : '#f9f9f9';
        t += '<tr style="background:' + bg + ';">';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:right;">' + inv.number + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:right;">' + toArDate(inv.invoiceDate) + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:right;">' + toArDate(inv.dueDate) + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:left;color:' + daysColor(inv.days) + ';font-weight:bold;">' + inv.days + '</td>';
        t += '<td style="padding:7px 8px;border:1px solid #ddd;text-align:left;">' + fmt(inv.amount) + '</td></tr>';
      }
      t += '<tr style="background:#e8f4f8;font-weight:bold;">';
      t += '<td colspan="4" style="padding:8px;border:1px solid #ddd;text-align:left;">إجمالي المتأخر:</td>';
      t += '<td style="padding:8px;border:1px solid #ddd;text-align:left;color:#15262E;">' + fmt(overdueTotal) + ' ر.س</td></tr></table>';
      return t;
    }

    // English letter
    var enHtml = [
      '<div style="' + ws + '">',
      '<p style="' + ps + 'color:#888;">Date: ' + date + '</p>',
      '<p style="' + ps + '">Dear Valued Customer,</p>',
      '<p style="' + ps + '">We truly appreciate the business relationship we have built with <strong>' + customer + '</strong>. Your partnership means a great deal to us.</p>',
      '<p style="' + ps + '">As part of our regular account review, we noticed that your account currently has <strong>' + invoices.length + ' overdue invoice' + (invoices.length !== 1 ? 's' : '') + '</strong> totaling <strong>SAR ' + fmt(overdueTotal) + '</strong> that require your attention.</p>',
      invoices.length > 0 ? '<h3 style="color:#15262E;border-bottom:2px solid #ED0C0C;padding-bottom:4px;margin:14px 0 8px;font-size:15px;">Top Overdue Invoices</h3>' : '',
      buildEnTable(),
      '<p style="' + ps + '">Could we ask you to look into this within the next <strong>7 business days</strong>? If there is anything on our end causing a delay, please let us know and we will address it right away.</p>',
      '<p style="' + ps + '">We value our partnership and look forward to resolving this matter together.</p>',
      '<p style="' + ps + '">Warm regards,</p>',
      '<p style="' + ps + '"><strong>Accounts Receivable</strong><br><strong>Zahid Group \u2014 Division ' + div + '</strong></p>',
      '</div>'
    ].join('\n');

    // Arabic letter
    var arDateStr = toArLetterDate(date);
    var arHtml = [
      '<div dir="rtl" style="' + ws + '">',
      '<p style="' + ps + 'color:#888;">التاريخ: ' + arDateStr + '</p>',
      '<p style="' + ps + '">عميلنا الكريم،</p>',
      '<p style="' + ps + '">نقدّر حقاً علاقة العمل التي بنيناها مع <strong>' + customer + '</strong>. شراكتكم تعني لنا الكثير.</p>',
      '<p style="' + ps + '">ضمن مراجعتنا الدورية للحسابات، لاحظنا أن حسابكم يحتوي حالياً على <strong>' + invoices.length + ' فاتورة متأخرة</strong> بإجمالي <strong>' + fmt(overdueTotal) + ' ر.س</strong> تتطلب اهتمامكم.</p>',
      invoices.length > 0 ? '<h3 style="color:#15262E;border-bottom:2px solid #ED0C0C;padding-bottom:4px;margin:14px 0 8px;font-size:15px;">أعلى الفواتير المتأخرة</h3>' : '',
      buildArTable(),
      '<p style="' + ps + '">هل يمكنكم التكرّم بمراجعة هذا الأمر خلال <strong>7 أيام عمل</strong>؟ إذا كان هناك أي شيء من طرفنا قد يُسبّب تأخيراً، يُرجى إعلامنا وسنتعامل معه فوراً.</p>',
      '<p style="' + ps + '">نُقدّر شراكتكم ونتطلع لحل هذا الأمر معاً.</p>',
      '<p style="' + ps + '">مع أطيب التحيات،</p>',
      '<p style="' + ps + '"><strong>الذمم المدينة</strong><br><strong>مجموعة زاهد \u2014 قسم ' + div + '</strong></p>',
      '</div>'
    ].join('\n');

    var letterHtml = lang === 'ar' ? arHtml : enHtml;
    var subjectText = lang === 'ar'
      ? 'تذكير ودّي \u2014 فواتير مستحقة | ' + customer
      : 'Friendly Reminder \u2014 Outstanding Invoices | ' + customer;

    var bodyDir = lang === 'ar' ? ' dir="rtl"' : '';
    var eml = [
      'From: ',
      'To: ',
      'Subject: ' + subjectText,
      'MIME-Version: 1.0',
      'X-Unsent: 1',
      'Content-Type: text/html; charset=UTF-8',
      '',
      '<!DOCTYPE html>',
      '<html' + bodyDir + '><head><meta charset="utf-8"></head>',
      '<body style="margin:0;padding:20px;"' + bodyDir + '>',
      letterHtml,
      '</body></html>'
    ].join('\r\n');

    var blob = new Blob([eml], { type: 'message/rfc822' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var safeName = customer.replace(/[^a-zA-Z0-9 ]/g, '').substring(0, 30).trim().replace(/\s+/g, '_');
    var today = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = 'Dunning_' + safeName + '_' + today + '.eml';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML =
      '<span class="success">\u2713 Email downloaded</span><br><br>' +
      '<span style="font-size:13px;color:#666;">Closing...</span>';
    setTimeout(function() { window.open('', '_self'); window.close(); }, 1500);

  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML = '<span class="error">Error: ' + e.message + '</span>';
  }

  function showErr(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('status').innerHTML = '<span class="error">' + msg + '</span>';
  }
})();
</script>
</body>
</html>
